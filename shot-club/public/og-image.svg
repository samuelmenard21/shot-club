<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#07090f"/>
      <stop offset="100%" stop-color="#0c1220"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="glowBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2979ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2979ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>

  <!-- Left side: branding -->
  <text x="68" y="100" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="800" font-size="18" fill="#2979ff" letter-spacing="3" opacity="0.9">HOCKEY SHOT CHALLENGE</text>

  <text x="68" y="200" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="800" font-size="82" fill="white" letter-spacing="-1" line-height="1">Track</text>
  <text x="68" y="285" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="800" font-size="82" fill="white" letter-spacing="-1">every shot.</text>
  <text x="68" y="370" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="800" font-size="82" fill="#2979ff" letter-spacing="-1" filter="url(#glow)">Climb the</text>
  <text x="68" y="455" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="800" font-size="82" fill="#2979ff" letter-spacing="-1" filter="url(#glow)">rankings.</text>

  <text x="68" y="555" font-family="'Barlow', Arial, sans-serif" font-weight="400" font-size="24" fill="#4a6080">Free for players, parents &amp; coaches</text>
  <text x="68" y="595" font-family="'Barlow', Arial, sans-serif" font-weight="600" font-size="20" fill="#2979ff" opacity="0.8">hockeyshotchallenge.com</text>

  <!-- Right side: leaderboard card -->
  <!-- Card shadow -->
  <rect x="645" y="55" width="510" height="520" rx="20" fill="#000000" opacity="0.5"/>
  <!-- Card -->
  <rect x="638" y="48" width="510" height="520" rx="20" fill="#0f1623" stroke="#1e2d4a" stroke-width="1.5"/>

  <!-- Card header -->
  <rect x="638" y="48" width="510" height="64" rx="20" fill="#111d30"/>
  <rect x="638" y="88" width="510" height="24" fill="#111d30"/>

  <text x="668" y="84" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="700" font-size="17" fill="white" letter-spacing="1">SQUAD BATTLE — WEEK 27</text>
  <text x="1118" y="84" font-family="'Barlow', Arial, sans-serif" font-weight="500" font-size="14" fill="#4a6080" text-anchor="end">Sun 11:59pm</text>

  <!-- Divider -->
  <line x1="638" y1="112" x2="1148" y2="112" stroke="#1e2d4a" stroke-width="1"/>

  <!-- Team label -->
  <text x="668" y="143" font-family="'Barlow', Arial, sans-serif" font-weight="600" font-size="13" fill="#4a6080" letter-spacing="2">YOUR SQUAD</text>
  <text x="1118" y="143" font-family="'Barlow', Arial, sans-serif" font-weight="700" font-size="13" fill="#4ade80" text-anchor="end" letter-spacing="1">WINNING +89</text>

  <!-- Row 1 — YOU (highlighted) -->
  <rect x="648" y="155" width="490" height="64" rx="12" fill="url(#glowBlue)" stroke="#2979ff" stroke-width="1.5" opacity="0.9"/>
  <rect x="648" y="155" width="490" height="64" rx="12" fill="#1a2847" opacity="0.5"/>
  <!-- Rank badge -->
  <rect x="664" y="169" width="32" height="32" rx="8" fill="#2979ff" opacity="0.2"/>
  <text x="680" y="190" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="800" font-size="18" fill="#2979ff" text-anchor="middle">#1</text>
  <!-- Name + rank -->
  <text x="710" y="183" font-family="'Barlow', Arial, sans-serif" font-weight="700" font-size="17" fill="white">You (Tyler B.)</text>
  <text x="710" y="203" font-family="'Barlow', Arial, sans-serif" font-weight="500" font-size="13" fill="#4a90d9">Prospect II · 9-day streak 🔥</text>
  <!-- Shot count -->
  <text x="1118" y="196" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="800" font-size="26" fill="white" text-anchor="end">247</text>
  <text x="1118" y="213" font-family="'Barlow', Arial, sans-serif" font-weight="500" font-size="12" fill="#4a6080" text-anchor="end">shots</text>

  <!-- Row 2 -->
  <rect x="648" y="230" width="490" height="60" rx="12" fill="#0d1520" opacity="0.6"/>
  <rect x="664" y="244" width="32" height="32" rx="8" fill="#1a2035"/>
  <text x="680" y="265" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="800" font-size="18" fill="#6b7fa8" text-anchor="middle">#2</text>
  <text x="710" y="258" font-family="'Barlow', Arial, sans-serif" font-weight="700" font-size="17" fill="#c8d8f0">Liam K.</text>
  <text x="710" y="278" font-family="'Barlow', Arial, sans-serif" font-weight="500" font-size="13" fill="#4a6080">Prospect I · 5-day streak</text>
  <text x="1118" y="268" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="800" font-size="26" fill="#8899b4" text-anchor="end">191</text>
  <text x="1118" y="285" font-family="'Barlow', Arial, sans-serif" font-weight="500" font-size="12" fill="#4a6080" text-anchor="end">shots</text>

  <!-- Row 3 -->
  <rect x="648" y="302" width="490" height="60" rx="12" fill="#0d1520" opacity="0.4"/>
  <rect x="664" y="316" width="32" height="32" rx="8" fill="#1a2035"/>
  <text x="680" y="337" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="800" font-size="18" fill="#6b7fa8" text-anchor="middle">#3</text>
  <text x="710" y="330" font-family="'Barlow', Arial, sans-serif" font-weight="700" font-size="17" fill="#c8d8f0">Jake T.</text>
  <text x="710" y="350" font-family="'Barlow', Arial, sans-serif" font-weight="500" font-size="13" fill="#4a6080">Rookie III · 3-day streak</text>
  <text x="1118" y="340" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="800" font-size="26" fill="#8899b4" text-anchor="end">84</text>
  <text x="1118" y="357" font-family="'Barlow', Arial, sans-serif" font-weight="500" font-size="12" fill="#4a6080" text-anchor="end">shots</text>

  <!-- Row 4 -->
  <rect x="648" y="374" width="490" height="60" rx="12" fill="#0d1520" opacity="0.3"/>
  <rect x="664" y="388" width="32" height="32" rx="8" fill="#1a2035"/>
  <text x="680" y="409" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="800" font-size="18" fill="#6b7fa8" text-anchor="middle">#4</text>
  <text x="710" y="402" font-family="'Barlow', Arial, sans-serif" font-weight="700" font-size="17" fill="#c8d8f0">Owen S.</text>
  <text x="710" y="422" font-family="'Barlow', Arial, sans-serif" font-weight="500" font-size="13" fill="#4a6080">Rookie II</text>
  <text x="1118" y="412" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="800" font-size="26" fill="#8899b4" text-anchor="end">42</text>
  <text x="1118" y="429" font-family="'Barlow', Arial, sans-serif" font-weight="500" font-size="12" fill="#4a6080" text-anchor="end">shots</text>

  <!-- Divider -->
  <line x1="638" y1="450" x2="1148" y2="450" stroke="#1e2d4a" stroke-width="1"/>
  <text x="668" y="476" font-family="'Barlow', Arial, sans-serif" font-weight="600" font-size="13" fill="#4a6080" letter-spacing="2">VS. RIVAL SQUAD</text>
  <text x="1118" y="476" font-family="'Barlow', Arial, sans-serif" font-weight="500" font-size="13" fill="#6b7fa8" text-anchor="end">158 shots total</text>

  <!-- Rival rows (muted) -->
  <rect x="648" y="490" width="490" height="40" rx="10" fill="#0d1520" opacity="0.3"/>
  <text x="710" y="515" font-family="'Barlow', Arial, sans-serif" font-weight="500" font-size="15" fill="#4a6080">Cam R., Noah D., Mason P., Eli W.</text>
  <text x="1118" y="515" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="700" font-size="18" fill="#4a6080" text-anchor="end">trailing</text>

  <!-- Card bottom label -->
  <text x="893" y="554" font-family="'Barlow', Arial, sans-serif" font-weight="400" font-size="13" fill="#2d3f5a" text-anchor="middle">Resets every Monday · Free for all players</text>
</svg>
