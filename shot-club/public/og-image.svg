<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#07090f"/>
      <stop offset="100%" stop-color="#0c1220"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Left side: branding + messaging -->
  <text x="68" y="100" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="800" font-size="18" fill="#2979ff" letter-spacing="3" opacity="0.9">HOCKEY SHOT CHALLENGE</text>

  <text x="68" y="200" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="800" font-size="72" fill="white" letter-spacing="-1" line-height="1">Track</text>
  <text x="68" y="270" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="800" font-size="72" fill="white" letter-spacing="-1">shots.</text>
  <text x="68" y="360" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="800" font-size="72" fill="#2979ff" letter-spacing="-1" filter="url(#glow)">Beat your</text>
  <text x="68" y="430" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="800" font-size="72" fill="#2979ff" letter-spacing="-1" filter="url(#glow)">rival.</text>

  <text x="68" y="530" font-family="'Barlow', Arial, sans-serif" font-weight="400" font-size="22" fill="#4a6080">1v1 weekly battles</text>
  <text x="68" y="560" font-family="'Barlow', Arial, sans-serif" font-weight="400" font-size="22" fill="#4a6080">Free for all ages</text>

  <!-- Right side: 1v1 battle card -->
  <g>
    <!-- Card background -->
    <rect x="645" y="55" width="510" height="520" rx="20" fill="#0f1623" stroke="#1e2d4a" stroke-width="1.5"/>

    <!-- Header -->
    <rect x="645" y="55" width="510" height="70" rx="20" fill="#111d30"/>
    <text x="675" y="95" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="700" font-size="17" fill="white" letter-spacing="1">⚔️ 1V1 BATTLE · THIS WEEK</text>

    <!-- Divider -->
    <line x1="645" y1="125" x2="1155" y2="125" stroke="#1e2d4a" stroke-width="1"/>

    <!-- You side -->
    <text x="700" y="165" font-family="'Barlow', Arial, sans-serif" font-weight="700" font-size="16" fill="#2979ff">YOU</text>
    <text x="700" y="215" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="800" font-size="52" fill="white">247</text>
    <text x="700" y="245" font-family="'Barlow', Arial, sans-serif" font-weight="500" font-size="13" fill="#4a6080">shots logged</text>
    <text x="700" y="265" font-family="'Barlow', Arial, sans-serif" font-weight="500" font-size="12" fill="#22c55e">✓ logged today</text>

    <!-- VS center -->
    <text x="900" y="220" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="800" font-size="24" fill="#4a6080" text-anchor="middle">VS</text>

    <!-- Rival side -->
    <text x="1100" y="165" font-family="'Barlow', Arial, sans-serif" font-weight="700" font-size="16" fill="#4a6080" text-anchor="end">TYLER B.</text>
    <text x="1100" y="215" font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif" font-weight="800" font-size="52" fill="#8899b4" text-anchor="end">189</text>
    <text x="1100" y="245" font-family="'Barlow', Arial, sans-serif" font-weight="500" font-size="13" fill="#4a6080" text-anchor="end">shots logged</text>
    <text x="1100" y="265" font-family="'Barlow', Arial, sans-serif" font-weight="500" font-size="12" fill="#22c55e" text-anchor="end">✓ logged today</text>

    <!-- Progress bar -->
    <rect x="675" y="305" width="430" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>
    <rect x="675" y="305" width="224" height="8" rx="4" fill="url(#barGrad)"/>
    <defs>
      <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#1d4ed8"/>
        <stop offset="100%" stop-color="#67e8f9"/>
      </linearGradient>
    </defs>
    <text x="675" y="330" font-family="'Barlow', Arial, sans-serif" font-weight="600" font-size="12" fill="#4a6080">56% winning</text>

    <!-- Status -->
    <text x="900" y="380" font-family="'Barlow', Arial, sans-serif" font-weight="600" font-size="14" fill="#f87171" text-anchor="middle">💪 Down 58 shots — time to push</text>

    <!-- Features list -->
    <text x="675" y="440" font-family="'Barlow', Arial, sans-serif" font-weight="700" font-size="12" fill="white" letter-spacing="1">HOW IT WORKS</text>

    <text x="675" y="470" font-family="'Barlow', Arial, sans-serif" font-weight="600" font-size="13" fill="#c8d8f0">📱 Log shots in 5 seconds</text>
    <text x="675" y="495" font-family="'Barlow', Arial, sans-serif" font-weight="600" font-size="13" fill="#c8d8f0">📈 Track streaks &amp; ranks</text>
    <text x="675" y="520" font-family="'Barlow', Arial, sans-serif" font-weight="600" font-size="13" fill="#c8d8f0">⚔️ Every Monday: new rival</text>

    <!-- Bottom -->
    <text x="900" y="555" font-family="'Barlow', Arial, sans-serif" font-weight="400" font-size="12" fill="#2d3f5a" text-anchor="middle">Free for all ages · No app to download</text>
  </g>
</svg>
