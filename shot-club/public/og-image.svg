  <text x="600" y="548" font-family="'Barlow', Arial, sans-serif" font-weight="500" font-size="28" fill="#6b7fa8" text-anchor="middle" letter-spacing="2">TRACK EVERY SHOT · CLIMB THE RANKINGS</text>

